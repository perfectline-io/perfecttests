<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PerfectLine — Code Health</title>
<!-- __HEALTH_DATA__ -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:         oklch(0.985 0.002 250);
  --fg:         oklch(0.12 0.005 250);
  --card:       oklch(0.995 0.001 250);
  --card-fg:    oklch(0.12 0.005 250);
  --secondary:  oklch(0.955 0.003 250);
  --muted:      oklch(0.955 0.003 250);
  --muted-fg:   oklch(0.45 0.008 250);
  --border:     oklch(0.91 0.003 250);
  --input:      oklch(0.91 0.003 250);
  --accent-warm:oklch(0.48 0.14 280);

  --success:    oklch(0.48 0.15 152);
  --warning:    oklch(0.52 0.15 85);
  --info:       oklch(0.45 0.18 258);
  --error:      oklch(0.50 0.18 25);

  --shadow-xs:  0 1px 2px 0 oklch(0 0 0 / 0.05);
  --shadow-sm:  0 2px 8px -2px oklch(0 0 0 / 0.08);
  --shadow-md:  0 8px 24px -6px oklch(0 0 0 / 0.1);

  --radius:     0.5rem;
  --font-body:  'Outfit', system-ui, sans-serif;
  --font-display:'Space Grotesk', system-ui, sans-serif;
}

.dark{
  --bg:         oklch(0.12 0.005 250);
  --fg:         oklch(0.93 0.003 250);
  --card:       oklch(0.16 0.005 250);
  --card-fg:    oklch(0.93 0.003 250);
  --secondary:  oklch(0.20 0.005 250);
  --muted:      oklch(0.18 0.005 250);
  --muted-fg:   oklch(0.60 0.006 250);
  --border:     oklch(0.24 0.005 250);
  --input:      oklch(0.20 0.005 250);
  --accent-warm:oklch(0.68 0.14 280);

  --success:    oklch(0.72 0.18 152);
  --warning:    oklch(0.78 0.16 87);
  --info:       oklch(0.65 0.18 258);
  --error:      oklch(0.68 0.18 25);

  --shadow-xs:  0 1px 2px 0 oklch(0 0 0 / 0.15);
  --shadow-sm:  0 2px 8px -2px oklch(0 0 0 / 0.25);
  --shadow-md:  0 8px 24px -6px oklch(0 0 0 / 0.3);
}

body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--fg);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:var(--muted-fg)}

/* ── Layout ── */
.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
@media(min-width:640px){.container{padding:2.5rem 2rem}}

/* ── Header ── */
header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:2.5rem;flex-wrap:wrap}
header .brand{display:flex;flex-direction:column;gap:0.25rem}
.brand h1{
  font-family:var(--font-display);
  font-weight:700;
  font-size:1.5rem;
  letter-spacing:-0.035em;
  line-height:1.2;
}
.brand h1 span{color:var(--accent-warm)}
.meta{color:var(--muted-fg);font-size:0.8125rem;font-weight:400}
.header-actions{display:flex;gap:0.5rem;flex-shrink:0}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:0.375rem;
  font-family:var(--font-body);font-size:0.8125rem;font-weight:500;
  padding:0.4375rem 0.875rem;
  background:var(--card);border:1px solid var(--border);color:var(--fg);
  border-radius:var(--radius);cursor:pointer;
  transition:border-color 150ms,box-shadow 150ms,background 150ms;
  box-shadow:var(--shadow-xs);
}
.btn:hover{border-color:var(--muted-fg);box-shadow:var(--shadow-sm)}
.btn.active{border-color:var(--accent-warm);color:var(--accent-warm)}

/* ── Stat strip ── */
.stat-strip{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:0.75rem;margin-bottom:2rem;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem 1.25rem;box-shadow:var(--shadow-xs);
  transition:box-shadow 250ms,border-color 250ms;
}
.stat-card:hover{box-shadow:var(--shadow-sm)}
.stat-label{font-size:0.6875rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted-fg);margin-bottom:0.25rem}
.stat-value{font-family:var(--font-display);font-weight:700;font-size:1.75rem;letter-spacing:-0.035em;line-height:1.1}

/* ── Service table ── */
.table-wrap{
  background:var(--card);border:1px solid var(--border);border-radius:calc(var(--radius) + 2px);
  overflow:hidden;box-shadow:var(--shadow-xs);margin-bottom:2rem;
}
.summary-table{width:100%;border-collapse:collapse}
.summary-table th{
  font-family:var(--font-display);font-size:0.6875rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.1em;color:var(--muted-fg);
  padding:0.75rem 1rem;text-align:left;
  border-bottom:1px solid var(--border);background:var(--secondary);
}
.summary-table td{padding:0.75rem 1rem;border-bottom:1px solid var(--border);font-size:0.875rem}
.summary-table tbody tr{cursor:pointer;transition:background 150ms}
.summary-table tbody tr:hover{background:var(--secondary)}
.summary-table tbody tr:last-child td{border-bottom:none}
.service-name{font-weight:600;font-family:var(--font-display);letter-spacing:-0.02em}

/* ── Grade badge ── */
.grade{
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:0.8125rem;
  min-width:2.25rem;padding:0.125rem 0.5rem;border-radius:var(--radius);
  letter-spacing:-0.02em;
}
.grade-a{background:color-mix(in oklch,var(--success) 12%,transparent);color:var(--success)}
.grade-b{background:color-mix(in oklch,var(--success) 12%,transparent);color:var(--success)}
.grade-c{background:color-mix(in oklch,var(--warning) 12%,transparent);color:var(--warning)}
.grade-d{background:color-mix(in oklch,var(--error) 12%,transparent);color:var(--error)}
.grade-f{background:color-mix(in oklch,var(--error) 12%,transparent);color:var(--error)}

/* ── Score bar ── */
.score-bar{display:flex;align-items:center;gap:0.5rem}
.score-bar-track{width:72px;height:4px;background:var(--secondary);border-radius:2px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:2px;transition:width 450ms cubic-bezier(0.16,1,0.3,1)}
.score-val{font-size:0.75rem;color:var(--muted-fg);min-width:1.5rem;font-variant-numeric:tabular-nums}

/* ── Issue counts ── */
.issue-counts{display:flex;gap:0.375rem;font-size:0.75rem;font-weight:500}
.issue-counts span{padding:0.0625rem 0.375rem;border-radius:var(--radius);font-variant-numeric:tabular-nums}
.cnt-error{background:color-mix(in oklch,var(--error) 10%,transparent);color:var(--error)}
.cnt-warning{background:color-mix(in oklch,var(--warning) 10%,transparent);color:var(--warning)}
.cnt-info{background:color-mix(in oklch,var(--info) 10%,transparent);color:var(--info)}

/* ── Service detail panel ── */
.detail{
  display:none;background:var(--card);border:1px solid var(--border);
  border-radius:calc(var(--radius) + 2px);padding:1.5rem;margin-bottom:1rem;
  box-shadow:var(--shadow-xs);
  animation:fadeInPanel 250ms cubic-bezier(0.16,1,0.3,1);
}
.detail.open{display:block}
@keyframes fadeInPanel{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.detail h3{font-family:var(--font-display);font-weight:700;font-size:1.125rem;letter-spacing:-0.035em;margin-bottom:1rem}
.dim-grid{display:flex;flex-direction:column;gap:0.125rem}
.dim-row{display:flex;align-items:center;gap:1rem;padding:0.5rem 0;border-bottom:1px solid var(--border)}
.dim-row:last-of-type{border-bottom:none}
.dim-name{width:140px;font-size:0.8125rem;font-weight:500;color:var(--muted-fg);flex-shrink:0}
.dim-bar{flex:1;display:flex;align-items:center;gap:0.5rem}
.dim-bar-track{flex:1;height:6px;background:var(--secondary);border-radius:3px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:3px;transition:width 450ms cubic-bezier(0.16,1,0.3,1)}
.dim-score{font-family:var(--font-display);font-size:0.875rem;font-weight:600;min-width:2rem;text-align:right}

/* ── Detail issues ── */
.detail-issues{margin-top:0.75rem;padding-left:0.5rem}
.detail-issue{display:flex;align-items:baseline;gap:0.625rem;padding:0.3125rem 0;font-size:0.8125rem}
.detail-issue .sev{
  font-size:0.625rem;font-weight:600;padding:0.0625rem 0.3125rem;border-radius:3px;
  text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;
}
.sev-error{background:color-mix(in oklch,var(--error) 12%,transparent);color:var(--error)}
.sev-warning{background:color-mix(in oklch,var(--warning) 12%,transparent);color:var(--warning)}
.sev-info{background:color-mix(in oklch,var(--info) 12%,transparent);color:var(--info)}
.detail-issue .msg{flex:1;color:var(--card-fg)}
.detail-issue .file{font-size:0.75rem;color:var(--muted-fg);font-variant-numeric:tabular-nums}

/* ── Issues section ── */
.issues-section{margin-top:0.5rem}
.issues-section h2{font-family:var(--font-display);font-weight:700;font-size:1.125rem;letter-spacing:-0.035em;margin-bottom:0.75rem}
.filter-bar{display:flex;gap:0.375rem;margin-bottom:1rem;flex-wrap:wrap}
.issue-list{
  background:var(--card);border:1px solid var(--border);border-radius:calc(var(--radius) + 2px);
  overflow:hidden;box-shadow:var(--shadow-xs);
}
.issue-row{display:flex;align-items:baseline;gap:0.75rem;padding:0.5rem 1rem;font-size:0.8125rem;border-bottom:1px solid var(--border)}
.issue-row:last-child{border-bottom:none}
.issue-service{color:var(--muted-fg);min-width:100px;font-weight:500;flex-shrink:0}
.issue-msg{flex:1}
.issue-file{color:var(--muted-fg);font-size:0.75rem;font-variant-numeric:tabular-nums}

/* ── Sparklines ── */
.sparkline{margin-top:1rem}
.sparkline h3{font-size:0.8125rem;margin-bottom:0.25rem}
.sparkline svg{display:block}

/* ── Trends ── */
.trends{margin-top:2rem}
.trends h2{font-family:var(--font-display);font-weight:700;font-size:1.125rem;letter-spacing:-0.035em;margin-bottom:1rem}
.trend-item{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem}
.trend-label{font-size:0.8125rem;font-weight:500;min-width:120px}

/* ── Empty state ── */
.empty{
  text-align:center;padding:4rem 2rem;
  color:var(--muted-fg);font-size:0.9375rem;
}
.empty-icon{font-size:2rem;margin-bottom:0.75rem;opacity:0.4}

/* ── Beam divider ── */
.beam{position:relative;height:1px;background:var(--border);margin:2rem 0;overflow:hidden}
.beam::after{
  content:'';position:absolute;top:0;left:0;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,var(--accent-warm),transparent);
  animation:beamSlide 4s cubic-bezier(0.16,1,0.3,1) infinite;
}
@keyframes beamSlide{
  0%{transform:translateX(-100%);opacity:0}
  10%{opacity:1}90%{opacity:1}
  100%{transform:translateX(350%);opacity:0}
}

/* ── Responsive ── */
@media(max-width:768px){
  .container{padding:1rem}
  .summary-table th,.summary-table td{padding:0.5rem 0.625rem;font-size:0.8125rem}
  .score-bar-track{width:48px}
  .dim-name{width:100px}
  .dim-row{gap:0.5rem}
  .issue-row{flex-wrap:wrap;gap:0.375rem}
  .issue-service{min-width:auto}
}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  .beam::after{animation:none}
  .detail{animation:none}
  .score-bar-fill,.dim-bar-fill{transition:none}
}
</style>
</head>
<body class="dark">
<div class="container">
  <header>
    <div class="brand">
      <h1>Perfect<span>Line</span> Health</h1>
      <p class="meta" id="generated"></p>
    </div>
    <div class="header-actions">
      <button class="btn" id="theme-toggle" onclick="toggleTheme()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        Light
      </button>
      <button class="btn" onclick="downloadJson()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
    </div>
  </header>

  <div class="stat-strip" id="stats"></div>

  <div class="beam"></div>

  <div class="table-wrap">
    <table class="summary-table">
      <thead><tr id="table-head"></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div id="details"></div>

  <div class="beam"></div>

  <div class="issues-section">
    <h2>Issues</h2>
    <div class="filter-bar" id="filters"></div>
    <div class="issue-list" id="issue-list"></div>
  </div>

  <div id="trends" class="trends"></div>
</div>

<script>
(function(){
  const data = window.__HEALTH_DATA__
  if (!data) return

  document.getElementById('generated').textContent = 'Generated ' + new Date(data.generated).toLocaleString()

  const services = data.services || []
  const history = data.history || []

  if (services.length === 0) {
    document.querySelector('.table-wrap').innerHTML =
      '<div class="empty"><div class="empty-icon">&#9776;</div>No services found.<br><span style="font-size:.8125rem">Run <code>pf health</code> from your monorepo root.</span></div>'
    document.querySelector('.issues-section').style.display = 'none'
    return
  }

  const dims = []
  const dimSet = new Set()
  services.forEach(s => s.dimensions.forEach(d => {
    if (!dimSet.has(d.dimension)) { dimSet.add(d.dimension); dims.push(d.dimension) }
  }))

  // Stats strip
  const totalErrors = services.reduce((a,s) => a + s.issueCount.error, 0)
  const totalWarnings = services.reduce((a,s) => a + s.issueCount.warning, 0)
  const avgScore = Math.round(services.reduce((a,s) => a + s.compositeScore, 0) / services.length)
  const bestGrade = services.reduce((best,s) => gradeRank(s.grade) < gradeRank(best) ? s.grade : best, services[0].grade)

  const statsHtml =
    statCard('Services', services.length) +
    statCard('Avg Score', avgScore) +
    statCard('Best Grade', bestGrade) +
    statCard('Errors', totalErrors, totalErrors > 0 ? 'var(--error)' : null) +
    statCard('Warnings', totalWarnings, totalWarnings > 0 ? 'var(--warning)' : null)
  document.getElementById('stats').innerHTML = statsHtml

  function statCard(label, value, color) {
    return '<div class="stat-card"><div class="stat-label">' + label + '</div><div class="stat-value"' +
      (color ? ' style="color:' + color + '"' : '') + '>' + value + '</div></div>'
  }

  // Grade helpers
  function gradeClass(g) {
    if (g === 'F') return 'grade-f'
    if (g === 'D') return 'grade-d'
    if (g.startsWith('C')) return 'grade-c'
    if (g.startsWith('B')) return 'grade-b'
    return 'grade-a'
  }
  function gradeRank(g) {
    const order = ['A+','A','A-','B+','B','B-','C+','C','C-','D','F']
    const i = order.indexOf(g)
    return i === -1 ? order.length : i
  }
  function scoreColor(s) {
    if (s >= 75) return 'var(--success)'
    if (s >= 55) return 'var(--warning)'
    return 'var(--error)'
  }

  // Summary table
  const thead = document.getElementById('table-head')
  thead.innerHTML = '<th>Service</th><th>Grade</th><th>Score</th>' +
    dims.map(d => '<th>' + abbreviate(d) + '</th>').join('') + '<th>Issues</th>'

  const tbody = document.getElementById('table-body')
  services.forEach((s, i) => {
    const tr = document.createElement('tr')
    tr.onclick = () => toggleDetail(i)
    let cells = '<td class="service-name">' + esc(s.service) + '</td>'
    cells += '<td><span class="grade ' + gradeClass(s.grade) + '">' + s.grade + '</span></td>'
    cells += '<td>' + scoreBarHtml(s.compositeScore) + '</td>'
    dims.forEach(d => {
      const r = s.dimensions.find(x => x.dimension === d)
      cells += '<td>' + (r ? scoreBarHtml(r.rawScore) : '<span class="score-val">—</span>') + '</td>'
    })
    cells += '<td><div class="issue-counts">' +
      (s.issueCount.error ? '<span class="cnt-error">' + s.issueCount.error + 'E</span>' : '') +
      (s.issueCount.warning ? '<span class="cnt-warning">' + s.issueCount.warning + 'W</span>' : '') +
      (s.issueCount.info ? '<span class="cnt-info">' + s.issueCount.info + 'I</span>' : '') +
      '</div></td>'
    tr.innerHTML = cells
    tbody.appendChild(tr)
  })

  // Detail panels
  const detailsContainer = document.getElementById('details')
  services.forEach((s, i) => {
    const div = document.createElement('div')
    div.className = 'detail'
    div.id = 'detail-' + i
    let html = '<h3>' + esc(s.service) + ' <span class="grade ' + gradeClass(s.grade) + '" style="font-size:.875rem;vertical-align:middle">' + s.grade + '</span> <span style="color:var(--muted-fg);font-size:.875rem;font-weight:400">' + s.compositeScore + '/100</span></h3>'
    html += '<div class="dim-grid">'
    s.dimensions.forEach(d => {
      html += '<div class="dim-row">'
      html += '<span class="dim-name">' + esc(d.dimension) + '</span>'
      html += '<div class="dim-bar"><div class="dim-bar-track"><div class="dim-bar-fill" style="width:' +
        d.rawScore + '%;background:' + scoreColor(d.rawScore) + '"></div></div></div>'
      html += '<span class="dim-score" style="color:' + scoreColor(d.rawScore) + '">' + d.rawScore + '</span>'
      html += '</div>'
      if (d.issues.length > 0) {
        html += '<div class="detail-issues">'
        d.issues.forEach(issue => {
          html += '<div class="detail-issue">'
          html += '<span class="sev sev-' + issue.severity + '">' + issue.severity + '</span>'
          html += '<span class="msg">' + esc(issue.message) + '</span>'
          if (issue.file) html += '<span class="file">' + esc(issue.file) + (issue.line ? ':' + issue.line : '') + '</span>'
          html += '</div>'
        })
        html += '</div>'
      }
    })
    html += '</div>'

    if (history.length >= 3) {
      const points = history.map(snap => {
        const svc = snap.services.find(x => x.service === s.service)
        return svc ? svc.compositeScore : null
      }).filter(x => x !== null)
      if (points.length >= 3) {
        html += '<div class="sparkline"><h3>Trend</h3>' + sparklineSvg(points) + '</div>'
      }
    }

    div.innerHTML = html
    detailsContainer.appendChild(div)
  })

  // Issue list
  // Default to showing errors+warnings only (not info)
  const hasErrors = services.some(s => s.issueCount.error > 0)
  const hasWarnings = services.some(s => s.issueCount.warning > 0)
  const defaultSev = hasErrors ? 'error' : hasWarnings ? 'warning' : 'all'
  let activeFilters = { severity: defaultSev === 'all' ? null : defaultSev }

  const allIssues = []
  services.forEach(s => s.dimensions.forEach(d => d.issues.forEach(issue => {
    allIssues.push({ service: s.service, dimension: d.dimension, issue })
  })))
  allIssues.sort((a, b) => {
    const order = { error: 0, warning: 1, info: 2 }
    return order[a.issue.severity] - order[b.issue.severity]
  })

  const filterBar = document.getElementById('filters')
  const severities = ['all', 'error', 'warning', 'info']
  severities.forEach(sev => {
    const btn = document.createElement('button')
    const count = allIssues.filter(x => sev === 'all' || x.issue.severity === sev).length
    btn.className = 'btn' + (sev === defaultSev ? ' active' : '')
    btn.textContent = (sev === 'all' ? 'All' : sev.charAt(0).toUpperCase() + sev.slice(1)) + ' (' + count + ')'
    btn.onclick = () => {
      activeFilters.severity = sev === 'all' ? null : sev
      filterBar.querySelectorAll('.btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      renderIssues()
    }
    filterBar.appendChild(btn)
  })

  function renderIssues() {
    const list = document.getElementById('issue-list')
    const filtered = allIssues.filter(x => {
      if (activeFilters.severity && x.issue.severity !== activeFilters.severity) return false
      return true
    })
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty" style="padding:2rem">No issues found.</div>'
      return
    }
    list.innerHTML = filtered.map(x =>
      '<div class="issue-row">' +
      '<span class="sev sev-' + x.issue.severity + '">' + x.issue.severity + '</span>' +
      '<span class="issue-service">' + esc(x.service) + '</span>' +
      '<span class="issue-msg">' + esc(x.issue.message) + '</span>' +
      (x.issue.file ? '<span class="issue-file">' + esc(x.issue.file) + (x.issue.line ? ':' + x.issue.line : '') + '</span>' : '') +
      '</div>'
    ).join('')
  }
  renderIssues()

  // Trends
  if (history.length >= 3) {
    const trendsDiv = document.getElementById('trends')
    let html = '<h2>Score Trends</h2>'
    services.forEach(s => {
      const points = history.map(snap => {
        const svc = snap.services.find(x => x.service === s.service)
        return svc ? svc.compositeScore : null
      }).filter(x => x !== null)
      if (points.length >= 3) {
        html += '<div class="trend-item"><span class="trend-label">' + esc(s.service) + '</span>' + sparklineSvg(points) + '</div>'
      }
    })
    trendsDiv.innerHTML = html
  }

  // Helpers
  function toggleDetail(i) {
    const el = document.getElementById('detail-' + i)
    el.classList.toggle('open')
  }

  function scoreBarHtml(score) {
    return '<div class="score-bar"><div class="score-bar-track"><div class="score-bar-fill" style="width:' +
      score + '%;background:' + scoreColor(score) + '"></div></div><span class="score-val">' + score + '</span></div>'
  }

  function sparklineSvg(points) {
    const w = 200, h = 40, pad = 2
    const min = Math.min(...points), max = Math.max(...points)
    const range = max - min || 1
    const coords = points.map((p, i) => {
      const x = pad + (i / (points.length - 1)) * (w - pad * 2)
      const y = pad + (1 - (p - min) / range) * (h - pad * 2)
      return x + ',' + y
    })
    const color = scoreColor(points[points.length - 1])
    return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
      '<polyline points="' + coords.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
      '<circle cx="' + coords[coords.length - 1].split(',')[0] + '" cy="' + coords[coords.length - 1].split(',')[1] +
      '" r="2.5" fill="' + color + '"/></svg>'
  }

  function abbreviate(dim) {
    const map = {
      'Type Safety': 'Types', 'Lint Compliance': 'Lint', 'Test Coverage': 'Coverage',
      'Test Health': 'Tests', 'Dependency Health': 'Deps', 'Bundle Health': 'Bundle', 'Code Complexity': 'Complex.'
    }
    return map[dim] || dim.substring(0, 8)
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

  // Theme
  window.toggleTheme = function() {
    document.body.classList.toggle('dark')
    const isDark = document.body.classList.contains('dark')
    const btn = document.getElementById('theme-toggle')
    btn.innerHTML = isDark
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Light'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Dark'
  }

  window.downloadJson = function() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = 'health-report.json'
    a.click()
  }
})()
</script>
</body>
</html>
